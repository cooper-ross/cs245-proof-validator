<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CS245E Proof Validator</title>

    <link rel="stylesheet" href="css/styles.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" />
  </head>
  <body>
    <h1>CS245 Proof Validator</h1>
    <p class="sub">Based on the natural deduction system outlined in <a href="https://cs.uwaterloo.ca/~eblais/cs245e/f25/pl-formalproofs">CS245</a>. Try pasting a proof! Controls on <a href="https://github.com/cooper-ross/cs245-proof-validator">Github</a>.</p>
    
    <div id="editor" class="editor"></div>

    <div class="actions"> <button id="check">Check proof</button></div>

    <div id="result" class="result"></div>

    <section class="latex-section">
      <h2>LaTeX preview</h2>
      <div id="latex-preview" class="latex-preview"></div>
      <button id="copy-latex" type="button">Copy LaTeX source</button>
      <pre id="latex-source" class="latex-source" hidden></pre>
    </section>

    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js"></script>
    <script src="js/formula.js"></script>
    <script src="js/proof.js"></script>
    <script src="js/validator.js"></script>
    <script src="js/latex.js"></script>
    <script src="js/paste.js"></script>
    <script defer src="js/app.js"></script>
  </body>
</html>
